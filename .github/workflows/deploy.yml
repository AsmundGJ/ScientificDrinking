# Build, test and deploy Pace to GitHub Pages on every push.
name: Deploy Pace

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test (58 specs — the sim core is the app)
        run: npx ng test

      - name: Build (production + service worker)
        run: npx ng build

      - name: SPA fallback for GitHub Pages
        # Deep links like /plan/<id> must serve the app, not a 404.
        run: cp dist/pace/browser/index.html dist/pace/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pace/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
